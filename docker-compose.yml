services:
  mysql:
    image: mysql:8.4
    container_name: shuku-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shuku_starship
      MYSQL_USER: shuku
      MYSQL_PASSWORD: shuku
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      target: runner
    container_name: shuku-web
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://shuku:shuku@mysql:3306/shuku_starship
      PYTHON_DATABASE_URL: mysql+pymysql://shuku:shuku@mysql:3306/shuku_starship
      STORAGE_ROOT: /app/storage
      DOWNLOAD_INBOX_PATH: /app/storage/downloads/inbox
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: starshipnas
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./monitor:/monitor
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  mysql_data:
