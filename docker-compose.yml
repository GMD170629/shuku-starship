services:
  mysql:
    image: mysql:8.4
    container_name: shuku-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shuku_starship
      MYSQL_USER: shuku
      MYSQL_PASSWORD: shuku
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: shuku-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: shuku-web
    depends_on:
      - mysql
      - redis
    environment:
      DATABASE_URL: mysql://shuku:shuku@mysql:3306/shuku_starship
      REDIS_URL: redis://redis:6379
      BOOKS_ROOT: /books
      STORAGE_ROOT: /app/storage
      FILE_STREAMS_PER_USER: 4
      SLOW_FILE_REQUEST_MS: 1500
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: starshipnas
    ports:
      - "3000:3000"
    volumes:
      - ./test-data/library:/books:ro
      - ./storage:/app/storage
    command: sh -c "pnpm --filter @shuku/database prisma:push && pnpm start"

  scan-worker:
    build:
      context: .
      dockerfile: workers/scan-worker/Dockerfile
    container_name: shuku-scan-worker
    depends_on:
      - mysql
      - redis
    environment:
      DATABASE_URL: mysql://shuku:shuku@mysql:3306/shuku_starship
      REDIS_URL: redis://redis:6379
      BOOKS_ROOT: /books
      STORAGE_ROOT: /app/storage
    volumes:
      - ./test-data/library:/books:ro
      - ./storage:/app/storage

volumes:
  mysql_data:
