services:
  mysql:
    image: mysql:8.4
    container_name: shuku-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shuku_starship
      MYSQL_USER: shuku
      MYSQL_PASSWORD: shuku
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: shuku-web
    depends_on:
      - mysql
    environment:
      DATABASE_URL: mysql://shuku:shuku@mysql:3306/shuku_starship
      MONITOR_ROOT: /monitor
      STORAGE_ROOT: /app/storage
      EPUB_MAX_SIZE_BYTES: ${EPUB_MAX_SIZE_BYTES:-536870912}
      COMIC_MAX_ARCHIVE_SIZE_BYTES: ${COMIC_MAX_ARCHIVE_SIZE_BYTES:-2147483648}
      FILE_STREAMS_PER_USER: 4
      SLOW_FILE_REQUEST_MS: 1500
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: starshipnas
      SESSION_SECRET: dev-session-secret-change-me-at-least-32-chars
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./monitor:/monitor:ro
      - ./storage:/app/storage
    command: sh -c "pnpm --filter @shuku/database exec prisma db push --accept-data-loss && pnpm --filter @shuku/web exec tsx ../../scripts/seed.ts && pnpm start"

  scan-worker:
    build:
      context: .
      dockerfile: workers/scan-worker/Dockerfile
    container_name: shuku-scan-worker
    depends_on:
      - mysql
    environment:
      DATABASE_URL: mysql://shuku:shuku@mysql:3306/shuku_starship
      MONITOR_ROOT: /monitor
      STORAGE_ROOT: /app/storage
      EPUB_MAX_SIZE_BYTES: ${EPUB_MAX_SIZE_BYTES:-536870912}
      COMIC_MAX_ARCHIVE_SIZE_BYTES: ${COMIC_MAX_ARCHIVE_SIZE_BYTES:-2147483648}
      SESSION_SECRET: dev-session-secret-change-me-at-least-32-chars
    volumes:
      - ./monitor:/monitor:ro
      - ./storage:/app/storage

volumes:
  mysql_data:
